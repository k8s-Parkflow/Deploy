apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-backend-blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: parking-backend
      color: blue
  template:
    metadata:
      labels:
        app: parking-backend
        color: blue
    spec:
      containers:
      - name: parking-backend
        image: hyungdongjo/parking-backend:latest 
        ports:
        - containerPort: 8000
        
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1024Mi

        # Ingress 경로인 /api를 포함하여 헬스체크 경로 수정
        readinessProbe:
          httpGet:
            path: /api/health/db/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /api/health/db/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20

        env:
        # 1. DB 인증 정보 (Secret의 실제 key 이름 반영)
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: password

        # 2. DB 이름 정보 (Secret에 정의된 key들)
        - name: COMMAND_DB_NAME
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: command_db_name
        - name: QUERY_DB_NAME
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: query_db_name
        - name: VEHICLE_DB_NAME
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: vehicle_db_name
        - name: ZONE_DB_NAME
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: zone_db_name

        # 3. DB 호스트 정보 (K8s 서비스 이름)
        - name: COMMAND_DB_HOST
          value: "parking-db-command-service"
        - name: QUERY_DB_HOST
          value: "parking-db-query-service"
        - name: VEHICLE_DB_HOST
          value: "parking-db-vehicle-service"
        - name: ZONE_DB_HOST
          value: "parking-db-zone-service"

        # 4. Django 설정
        - name: DJANGO_ALLOWED_HOSTS
          value: "*"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: django_secret_key


