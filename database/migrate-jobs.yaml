# [1] Orchestration Migrate Job
apiVersion: batch/v1
kind: Job
metadata:
  name: orchestration-migrate
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: hyungdongjo/parking-orchestration-app:latest
        command: ["/bin/bash"]
        args: ["./scripts/services/orchestration/migrate.sh"]
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_orchestration"
        - name: ORCHESTRATION_DB_NAME
          value: "/app/data/orchestration.sqlite3"
        - name: DATABASE_NAME
          value: "/app/data/orchestration.sqlite3"
        - name: DJANGO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: parking-secret, key: django_secret_key } }
        volumeMounts:
        - name: db-storage
          mountPath: /app/data
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: parking-db-pvc-orchestration
      restartPolicy: OnFailure
---
