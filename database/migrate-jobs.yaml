# 1. Orchestration Service Job
apiVersion: batch/v1
kind: Job
metadata:
  name: orchestration-migrate-job
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: hyungdongjo/parking-orchestration-app:latest
        command: ["/bin/sh", "-c"]
        args: ["/opt/venv/bin/python manage.py migrate --noinput --fake-initial"]
        env:
        - name: PYTHONPATH
          value: "/app:/app/shared:/app/contracts/gen/python:/app/services/orchestration-service/src"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_orchestration"
        - name: ORCHESTRATION_DB_HOST
          value: "orchestration-db-service"
        - name: ORCHESTRATION_DB_PORT
          value: "3306"
        - name: ORCHESTRATION_DB_NAME
          value: "parking_db"
        - name: ORCHESTRATION_DB_USER
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-id } }
        - name: ORCHESTRATION_DB_PASSWORD
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-password } }
      restartPolicy: OnFailure
---
