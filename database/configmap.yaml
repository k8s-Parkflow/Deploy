apiVersion: v1
kind: ConfigMap
metadata:
  name: parking-db-init-config
data:
  # [1] parking-command-service: 쓰기 모델 및 점유 제어 (SQLite)
  command-init.sql: |
    -- 로컬 멱등 처리 결과 저장
    CREATE TABLE IF NOT EXISTS PARKING_COMMAND_OPERATION (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        operation_id TEXT NOT NULL,
        action TEXT NOT NULL,
        response_payload TEXT, -- JSON snapshot
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        UNIQUE (operation_id, action)
    );

    -- Lock Anchor (Zone-service 미러)
    CREATE TABLE IF NOT EXISTS PARKING_SLOT (
        slot_id INTEGER PRIMARY KEY,
        zone_id INTEGER NOT NULL,
        slot_name TEXT NOT NULL,
        is_active INTEGER NOT NULL CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
    );
    CREATE UNIQUE INDEX IF NOT EXISTS uniq_slot_zone_slot_name ON PARKING_SLOT(zone_id, slot_name);

    -- 주차 세션 이력
    CREATE TABLE IF NOT EXISTS PARKING_HISTORY (
        history_id INTEGER PRIMARY KEY AUTOINCREMENT,
        slot_id INTEGER NOT NULL,
        zone_id INTEGER NOT NULL,
        slot_type_id INTEGER NOT NULL,
        slot_name TEXT NOT NULL,
        vehicle_num TEXT NOT NULL,
        status TEXT NOT NULL CHECK (status IN ('PARKED', 'EXITED')),
        entry_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        exit_at DATETIME NULL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id)
    );
    CREATE INDEX IF NOT EXISTS idx_history_slot_entry ON PARKING_HISTORY(slot_id, entry_at);
    CREATE INDEX IF NOT EXISTS idx_history_vehicle_exit ON PARKING_HISTORY(vehicle_num, exit_at);

    -- 현재 점유 상태
    CREATE TABLE IF NOT EXISTS SLOT_OCCUPANCY (
        slot_id INTEGER PRIMARY KEY,
        occupied INTEGER NOT NULL CHECK (occupied IN (0, 1)),
        vehicle_num TEXT NULL,
        history_id INTEGER NULL,
        occupied_at DATETIME NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id),
        FOREIGN KEY (history_id) REFERENCES PARKING_HISTORY(history_id),
        UNIQUE (history_id),
        CHECK (
            (occupied = 1 AND vehicle_num IS NOT NULL AND history_id IS NOT NULL AND occupied_at IS NOT NULL)
            OR
            (occupied = 0 AND vehicle_num IS NULL AND history_id IS NULL AND occupied_at IS NULL)
        )
    );

  # [2] parking-query-service: 조회 전용 Projection (SQLite)
  query-init.sql: |
    CREATE TABLE IF NOT EXISTS PARKING_QUERY_OPERATION (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        operation_id TEXT NOT NULL,
        action TEXT NOT NULL,
        response_payload TEXT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        UNIQUE (operation_id, action)
    );

    CREATE TABLE IF NOT EXISTS CURRENT_PARKING_VIEW (
        vehicle_num TEXT PRIMARY KEY,
        history_id INTEGER NULL,
        zone_id INTEGER NULL,
        slot_id INTEGER NULL,
        slot_code TEXT NULL,
        zone_name TEXT NULL,
        slot_name TEXT NULL,
        slot_type TEXT NOT NULL,
        entry_at DATETIME NOT NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS ZONE_AVAILABILITY (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        zone_id INTEGER NOT NULL,
        slot_type TEXT NOT NULL,
        total_count INTEGER NOT NULL,
        occupied_count INTEGER NOT NULL,
        available_count INTEGER NOT NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        UNIQUE (zone_id, slot_type),
        CHECK (available_count = total_count - occupied_count AND available_count >= 0)
    );
    CREATE INDEX IF NOT EXISTS idx_zone_type ON ZONE_AVAILABILITY(zone_id, slot_type);

  # [3] vehicle-service: 차량 마스터 정보 (SQLite)
  vehicle-init.sql: |
    CREATE TABLE IF NOT EXISTS VEHICLE (
        vehicle_num TEXT PRIMARY KEY,
        vehicle_type TEXT NOT NULL CHECK (vehicle_type IN ('GENERAL', 'EV', 'DISABLED')),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
    );

  # [4] zone-service: 슬롯 메타데이터 마스터 (SQLite)
  zone-init.sql: |
    CREATE TABLE IF NOT EXISTS ZONE (
        zone_id INTEGER PRIMARY KEY AUTOINCREMENT,
        zone_name TEXT NOT NULL UNIQUE,
        is_active INTEGER NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS SLOT_TYPE (
        slot_type_id INTEGER PRIMARY KEY AUTOINCREMENT,
        type_name TEXT NOT NULL UNIQUE,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS ZONE_PARKING_SLOT (
        slot_id INTEGER PRIMARY KEY AUTOINCREMENT,
        zone_id INTEGER NOT NULL,
        slot_type_id INTEGER NOT NULL,
        slot_code TEXT NOT NULL,
        is_active INTEGER NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (zone_id) REFERENCES ZONE(zone_id),
        FOREIGN KEY (slot_type_id) REFERENCES SLOT_TYPE(slot_type_id)
    );

  # [5] orchestration-service: Saga 상태 관리 (SQLite)
  orchestration-init.sql: |
    CREATE TABLE IF NOT EXISTS SAGA_OPERATION (
        operation_id TEXT PRIMARY KEY,
        idempotency_key TEXT NOT NULL UNIQUE,
        saga_type TEXT NOT NULL CHECK (saga_type IN ('ENTRY', 'EXIT')),
        status TEXT NOT NULL,
        current_step TEXT NULL,
        history_id INTEGER NULL,
        vehicle_num TEXT NULL,
        slot_id INTEGER NULL,
        last_error_code TEXT NULL,
        last_error_message TEXT NULL,
        result_snapshot TEXT NOT NULL, -- JSON snapshot
        completed_compensations TEXT NOT NULL, -- JSON list
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        completed_at DATETIME NULL
    );
