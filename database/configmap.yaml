apiVersion: v1
kind: ConfigMap
metadata:
  name: parking-db-init-config
data:
  # [1] parking-command-service: 쓰기 모델 및 점유 제어
  command-init.sql: |
    CREATE TABLE IF NOT EXISTS PARKING_COMMAND_OPERATION (
        id INT PRIMARY KEY AUTO_INCREMENT,
        operation_id VARCHAR(100) NOT NULL,
        action VARCHAR(50) NOT NULL,
        response_payload JSON, -- MariaDB에서는 JSON 타입 지원
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_op_action (operation_id, action)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS PARKING_SLOT (
        slot_id INT PRIMARY KEY,
        zone_id INT NOT NULL,
        slot_name VARCHAR(50) NOT NULL,
        is_active TINYINT(1) NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_zone_slot (zone_id, slot_name)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS PARKING_HISTORY (
        history_id INT PRIMARY KEY AUTO_INCREMENT,
        slot_id INT NOT NULL,
        zone_id INT NOT NULL,
        slot_type_id INT NOT NULL,
        slot_name VARCHAR(50) NOT NULL,
        vehicle_num VARCHAR(20) NOT NULL,
        status ENUM('PARKED', 'EXITED') NOT NULL, -- MariaDB는 ENUM 지원
        entry_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        exit_at DATETIME NULL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id),
        INDEX idx_history_slot_entry (slot_id, entry_at),
        INDEX idx_history_vehicle_exit (vehicle_num, exit_at)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS SLOT_OCCUPANCY (
        slot_id INT PRIMARY KEY,
        occupied TINYINT(1) NOT NULL DEFAULT 0 CHECK (occupied IN (0, 1)),
        vehicle_num VARCHAR(20) NULL,
        history_id INT NULL,
        occupied_at DATETIME NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (slot_id) REFERENCES PARKING_SLOT(slot_id),
        FOREIGN KEY (history_id) REFERENCES PARKING_HISTORY(history_id),
        UNIQUE KEY uniq_history (history_id),
        CONSTRAINT chk_occupancy_valid CHECK (
            (occupied = 1 AND vehicle_num IS NOT NULL AND history_id IS NOT NULL AND occupied_at IS NOT NULL)
            OR
            (occupied = 0 AND vehicle_num IS NULL AND history_id IS NULL AND occupied_at IS NULL)
        )
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [2] parking-query-service: 조회 전용 Projection
  query-init.sql: |
    CREATE TABLE IF NOT EXISTS PARKING_QUERY_OPERATION (
        id INT PRIMARY KEY AUTO_INCREMENT,
        operation_id VARCHAR(100) NOT NULL,
        action VARCHAR(50) NOT NULL,
        response_payload JSON,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_query_op (operation_id, action)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS CURRENT_PARKING_VIEW (
        vehicle_num VARCHAR(20) PRIMARY KEY,
        history_id INT NULL,
        zone_id INT NULL,
        slot_id INT NULL,
        slot_code VARCHAR(50) NULL,
        zone_name VARCHAR(100) NULL,
        slot_name VARCHAR(50) NULL,
        slot_type VARCHAR(20) NOT NULL,
        entry_at DATETIME NOT NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS ZONE_AVAILABILITY (
        id INT PRIMARY KEY AUTO_INCREMENT,
        zone_id INT NOT NULL,
        slot_type VARCHAR(20) NOT NULL,
        total_count INT NOT NULL,
        occupied_count INT NOT NULL,
        available_count INT NOT NULL,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        UNIQUE KEY uniq_zone_type (zone_id, slot_type),
        CONSTRAINT chk_available_math CHECK (available_count = total_count - occupied_count AND available_count >= 0)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [3] vehicle-service: 차량 마스터 정보
  vehicle-init.sql: |
    CREATE TABLE IF NOT EXISTS VEHICLE (
        vehicle_num VARCHAR(20) PRIMARY KEY,
        vehicle_type ENUM('GENERAL', 'EV', 'DISABLED') NOT NULL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [4] zone-service: 슬롯 메타데이터 마스터
  zone-init.sql: |
    CREATE TABLE IF NOT EXISTS ZONE (
        zone_id INT PRIMARY KEY AUTO_INCREMENT,
        zone_name VARCHAR(100) NOT NULL UNIQUE,
        is_active TINYINT(1) NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS SLOT_TYPE (
        slot_type_id INT PRIMARY KEY AUTO_INCREMENT,
        type_name VARCHAR(50) NOT NULL UNIQUE,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS ZONE_PARKING_SLOT (
        slot_id INT PRIMARY KEY AUTO_INCREMENT,
        zone_id INT NOT NULL,
        slot_type_id INT NOT NULL,
        slot_code VARCHAR(50) NOT NULL,
        is_active TINYINT(1) NOT NULL DEFAULT 1 CHECK (is_active IN (0, 1)),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        FOREIGN KEY (zone_id) REFERENCES ZONE(zone_id),
        FOREIGN KEY (slot_type_id) REFERENCES SLOT_TYPE(slot_type_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

  # [5] orchestration-service: Saga 상태 관리
  orchestration-init.sql: |
    CREATE TABLE IF NOT EXISTS SAGA_OPERATION (
        operation_id VARCHAR(64) PRIMARY KEY,
        idempotency_key VARCHAR(128) NOT NULL UNIQUE,
        saga_type ENUM('ENTRY', 'EXIT') NOT NULL,
        status VARCHAR(32) NOT NULL,
        current_step VARCHAR(64) NULL,
        history_id INT NULL,
        vehicle_num VARCHAR(20) NULL,
        slot_id INT NULL,
        last_error_code VARCHAR(64) NULL,
        last_error_message TEXT NULL,
        result_snapshot JSON NOT NULL,
        completed_compensations JSON NOT NULL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        completed_at DATETIME NULL
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
