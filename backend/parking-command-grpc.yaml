apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-command-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parking-command-grpc
  template:
    metadata:
      labels:
        app: parking-command-grpc
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-command-app:latest
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args: ["python manage.py run_parking_command_grpc"]

        # --- [추가] 볼륨 마운트 ---
        volumeMounts:
        - name: db-storage
          mountPath: /app/data

        env:
        # [수정] SQLite 경로 설정
        - name: DATABASE_NAME
          value: "/app/data/command.sqlite3"
        - name: PARKING_COMMAND_DB_NAME
          value: "/app/data/command.sqlite3"

        # 포트 및 기본 설정
        - name: PARKING_COMMAND_GRPC_PORT
          value: "50053"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_parking_command"
        - name: DJANGO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: parking-secret, key: django_secret_key } }

        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc:50015"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc:50016"
        - name: PARKING_QUERY_SERVICE_GRPC_TARGET
          value: "parking-query-grpc:50018"
      # --- [추가] 볼륨 정의 ---
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: parking-db-pvc-command
---
apiVersion: v1
kind: Service
metadata:
  name: parking-command-grpc
spec:
  selector:
    app: parking-command-grpc
  ports:
    - port: 50017
      targetPort: 50017
