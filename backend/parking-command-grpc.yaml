apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-command-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parking-command-grpc
  template:
    metadata:
      labels:
        app: parking-command-grpc
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-command-app:latest
        imagePullPolicy: Always
        command: ["/opt/venv/bin/python"]
        args: ["manage.py", "run_parking_command_grpc"]
        env:
        - name: PYTHONPATH
          value: "/app:/app/shared:/app/contracts/gen/python:/app/services/parking-command-service/src"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_parking_command"
        - name: PARKING_COMMAND_DB_HOST
          value: "parking-command-db-service"
        - name: PARKING_COMMAND_DB_NAME
          value: "parking_db"
        - name: PARKING_COMMAND_DB_USER
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-id } }
        - name: PARKING_COMMAND_DB_PASSWORD
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-password } }
        - name: DJANGO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: parking-secret, key: django_secret_key } }
        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc-service:50015"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc-service:50016"
---
apiVersion: v1
kind: Service
metadata:
  name: parking-command-grpc-service
spec:
  selector:
    app: parking-command-grpc
  ports:
    - protocol: TCP
      port: 50017
      targetPort: 50017
