# 1. Backend Blue HPA (사용자 진입점/게이트웨이)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parking-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parking-backend-blue
  minReplicas: 2          # MSA 분리로 부하가 줄었으므로 2개로 시작
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 20
        periodSeconds: 60

---

# 2. Orchestration App HPA (SAGA 로직/트랜잭션 제어)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parking-orchestration-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parking-orchestration-app
  minReplicas: 2          # 정합성 및 고가용성을 위해 최소 2개 유지
  maxReplicas: 5          # 오케스트레이터는 DB 커넥션을 많이 쓰므로 적절히 제한
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60 # SAGA 로직 처리를 위해 좀 더 민감하게 설정
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30 # 입차 요청 폭주 시 더 빠르게 대응
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
