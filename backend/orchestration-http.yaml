apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-http
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestration-http
  template:
    metadata:
      labels:
        app: orchestration-http
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-orchestration-app:latest
        imagePullPolicy: Always
        # Gunicorn 실행 시 --access-logfile - 옵션을 추가하여 봇의 요청 주소를 로그로 출력합니다.
        command: ["/opt/venv/bin/gunicorn"]
        args: [
          "--bind", "0.0.0.0:8000",
          "--workers", "2",
          "--access-logfile", "-",
          "park_py.wsgi:application"
        ]
        env:
        - name: PYTHONPATH
          value: "/app:/app/shared:/app/contracts/gen/python:/app/services/orchestration-service/src"
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_orchestration"
        - name: ORCHESTRATION_DB_HOST
          value: "orchestration-db-service"
        - name: ORCHESTRATION_DB_NAME
          value: "parking_db"
        - name: ORCHESTRATION_DB_USER
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-id } }
        - name: ORCHESTRATION_DB_PASSWORD
          valueFrom: { secretKeyRef: { name: parking-db-secret, key: user-password } }
        - name: DJANGO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: parking-secret, key: django_secret_key } }
        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc-service:50015"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc-service:50016"
        - name: PARKING_COMMAND_SERVICE_GRPC_TARGET
          value: "parking-command-grpc-service:50017"
        - name: PARKING_QUERY_SERVICE_GRPC_TARGET
          value: "parking-query-grpc-service:50018"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-http
spec:
  selector:
    app: orchestration-http
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
