apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestration-http
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestration-http
  template:
    metadata:
      labels:
        app: orchestration-http
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-orchestration-app:latest
        imagePullPolicy: Always
        command: ["gunicorn"]
        args: [
          "--bind", "0.0.0.0:8000",
          "park_py.wsgi:application",
          "--access-logfile", "-",
          "--error-logfile", "-",
          "--capture-output",
          "--log-level", "debug"
        ]
        ports:
        - containerPort: 8000
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "park_py.settings_orchestration"
        - name: DATABASE_NAME
          value: "/app/data/orchestration.sqlite3"
        - name: ORCHESTRATION_DB_NAME
          value: "/app/data/orchestration.sqlite3"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: parking-secret
              key: django_secret_key

        # --- gRPC 서비스 주소 설정 추가 (이 부분이 핵심입니다) ---
        - name: VEHICLE_SERVICE_GRPC_TARGET
          value: "vehicle-grpc:50051"
        - name: ZONE_SERVICE_GRPC_TARGET
          value: "zone-grpc:50052"
        - name: PARKING_COMMAND_SERVICE_GRPC_TARGET
          value: "parking-command-grpc:50053"
        - name: PARKING_QUERY_SERVICE_GRPC_TARGET
          value: "parking-query-grpc:50054"
        # --------------------------------------------------

        volumeMounts:
        - name: db-storage
          mountPath: /app/data

      volumes:
      - name: db-storage
        hostPath:
          # 앞서 PV 설정에서 사용하신 경로와 일치하도록 수정하는 것을 권장합니다.
          path: /mnt/data/parking/orchestration
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: orchestration-http
spec:
  selector:
    app: orchestration-http
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
