# 1. 오케스트레이션 앱 (App)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-orchestration-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parking-orchestration-app
  template:
    metadata:
      labels:
        app: parking-orchestration-app
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-orchestration-app:latest 
        ports:
        - containerPort: 8000 # 앱 서버 포트
        env:
        - name: DB_HOST
          value: "parking-db-orchestration-service" # 아까 만든 DB 서비스 이름
        - name: DB_NAME
          valueFrom: { secretKeyRef: { name: parking-secret, key: orchestration_db_name } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: parking-secret, key: username } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: parking-secret, key: password } }

---
# 2. 오케스트레이션 앱 서비스 (App Service)
apiVersion: v1
kind: Service
metadata:
  name: parking-orchestration-app-service
spec:
  type: ClusterIP
  selector:
    app: parking-orchestration-app
  ports:
    - port: 80
      targetPort: 8000 # 앱의 포트(8000)를 서비스 포트(80)로 연결
