apiVersion: apps/v1
kind: Deployment
metadata:
  name: parking-vehicle-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parking-vehicle-app
  template:
    metadata:
      labels:
        app: parking-vehicle-app
    spec:
      containers:
      - name: app
        image: hyungdongjo/parking-orchestration-app:latest # 동일 이미지 사용
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "parking-db-vehicle-service"
        - name: DB_NAME
          valueFrom: { secretKeyRef: { name: parking-secret, key: vehicle_db_name } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: parking-secret, key: username } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: parking-secret, key: password } }
        - name: DJANGO_ALLOWED_HOSTS
          value: "*"
        - name: DJANGO_SECRET_KEY
          valueFrom: { secretKeyRef: { name: parking-secret, key: django_secret_key } }
---
apiVersion: v1
kind: Service
metadata:
  name: parking-vehicle-app-service
spec:
  type: ClusterIP
  selector:
    app: parking-vehicle-app
  ports:
    - port: 80      # Orchestrator가 호출하는 포트
      targetPort: 8000 # Django 컨테이너 포트
